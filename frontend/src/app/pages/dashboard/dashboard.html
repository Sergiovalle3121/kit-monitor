<div style="display: grid; gap: 16px;">
  <!-- Estado API -->
  <mat-card appearance="outlined">
    <div style="display:flex; gap:12px; align-items:center; justify-content:space-between;">
      <div>
        <h3 style="margin:0;">API</h3>
        <div *ngIf="apiStatus==='loading'">Consultando /health…</div>
        <div *ngIf="apiStatus==='ok'" style="color: #22c55e;">OK · {{apiMessage}}</div>
        <div *ngIf="apiStatus==='fail'" style="color: #ef4444;">Falla · {{apiMessage}}</div>
      </div>
      <button mat-raised-button color="primary" (click)="checkApi()">Reintentar</button>
    </div>
  </mat-card>

  <!-- Tarjetas -->
  <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:12px;">
    <mat-card *ngFor="let c of cards" appearance="outlined">
      <div style="display:flex; flex-direction:column; gap:6px;">
        <span style="opacity:.7">{{c.title}}</span>
        <span style="font-size:28px; font-weight:700">{{c.value}}</span>
      </div>
    </mat-card>
  </div>

  <!-- Gráfico de barras (SVG) -->
  <mat-card appearance="outlined">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3 style="margin:0;">Gráfico</h3>
      <button mat-stroked-button (click)="randomize()">Random</button>
    </div>
    <svg viewBox="0 0 120 40" style="width:100%; height:160px; cursor:pointer; margin-top:8px;">
      <ng-container *ngFor="let v of chartData; let i = index">
        <rect (click)="onBarClick(i)"
              [attr.x]="i* (120/chartData.length) + 2"
              [attr.y]="40 - (v*3)"
              [attr.width]="(120/chartData.length) - 4"
              [attr.height]="v*3"
              [attr.fill]="i===selectedBar ? '#6366f1' : '#94a3b8'"></rect>
      </ng-container>
    </svg>
  </mat-card>

  <!-- Tabla -->
  <mat-card appearance="outlined">
    <h3 style="margin:0 0 8px 0;">Kits</h3>
    <table mat-table [dataSource]="data" style="width:100%;">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let r">{{r.id}}</td>
      </ng-container>
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let r">{{r.nombre}}</td>
      </ng-container>
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let r">
          <span [style.color]="r.estado==='OK' ? '#22c55e' : r.estado==='WARN' ? '#eab308' : '#ef4444'">
            {{r.estado}}
          </span>
        </td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let r">
          <button mat-button color="primary" (click)="onRowClick(r)">Ver</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
